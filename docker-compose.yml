# =============================================================================
# OpenKPI Studio — production compose
# =============================================================================
# Runs on Hetzner. Routed by the shared Coolify-managed Traefik proxy via the
# external `coolify` network and Traefik labels.
#
# Required env (in .env alongside this file on the server):
#   ANTHROPIC_API_KEY        — used when OPENKPI_AI_PROVIDER=anthropic
#   (optional)  OPENAI_API_KEY, AZURE_OPENAI_*
#
# Optional env:
#   OPENKPI_PORT     — host port (default 3050)
#   PUBLIC_HOSTNAME  — domain (default openstudio.oneplaceplatform.com)
#   TRAEFIK_NETWORK  — Coolify Traefik network name (default coolify)
# =============================================================================

networks:
  default:
    name: openkpi
  coolify:
    external: true
    name: ${TRAEFIK_NETWORK:-coolify}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: openkpi-studio:latest
    container_name: openkpi-studio-app
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      # Traefik routing (Coolify-managed). Routes https://${PUBLIC_HOSTNAME}
      # → this container on internal port 3000. Cert via Let's Encrypt.
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.openkpi-http.entryPoints=http
      - traefik.http.routers.openkpi-http.rule=Host(`${PUBLIC_HOSTNAME:-openstudio.oneplaceplatform.com}`)
      - traefik.http.routers.openkpi-http.middlewares=redirect-to-https
      - traefik.http.routers.openkpi-https.entryPoints=https
      - traefik.http.routers.openkpi-https.rule=Host(`${PUBLIC_HOSTNAME:-openstudio.oneplaceplatform.com}`)
      - traefik.http.routers.openkpi-https.tls=true
      - traefik.http.routers.openkpi-https.tls.certresolver=letsencrypt
      - traefik.http.services.openkpi.loadbalancer.server.port=3000
    environment:
      - NODE_ENV=production
      - OPENKPI_AI_PROVIDER=${OPENKPI_AI_PROVIDER:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      # ---- Database -----------------------------------------------------
      - DATABASE_URL=${DATABASE_URL:-}
      # ---- Connector credential encryption (AES-256-GCM key, base64) ----
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # ---- Cron shared secret (host crontab → /api/cron/* Bearer token) -
      - CRON_SECRET=${CRON_SECRET:-}
      # ---- DEV ONLY: enable passwordless sign-in (any email is accepted) -
      # Set OPENKPI_DEV_AUTH=true in the server's .env to enable.
      - OPENKPI_DEV_AUTH=${OPENKPI_DEV_AUTH:-}
      # ---- NextAuth -----------------------------------------------------
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://openstudio.oneplaceplatform.com}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
    ports:
      # Optional: also exposes the app on a direct host port. Handy for
      # smoke-testing without going through Traefik. Comment out if you only
      # want Traefik to reach it.
      - "${OPENKPI_PORT:-3050}:3000"
    # Override the Dockerfile's HEALTHCHECK so it doesn't trip on the / → /w/demo
    # 307 redirect (wget exits 8 on 3xx without --max-redirect). Probe the
    # final-destination page directly with --spider.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/w/demo"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 25s
